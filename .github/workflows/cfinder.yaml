# CFinder Pro Configuration
# This YAML file dynamically configures the CFinder Pro application

app:
  name: "CFinder Pro"
  version: "2.1.0"
  description: "Advanced Dark-Themed Search Tool for Large Codebases"
  author: "Mononeer"
  theme:
    primary_color: "#4fc3f7"
    secondary_color: "#bb86fc"
    background_dark: "#121212"
    background_darker: "#0a0a0a"
    panel_background: "#1e1e1e"
    text_primary: "#e0e0e0"
    text_secondary: "#a0a0a0"
    highlight_color: "#ffd740"

search:
  modes:
    - name: "content"
      description: "Search within file contents"
      enabled: true
    - name: "filename"
      description: "Search by filename"
      enabled: true
    - name: "function"
      description: "Search for function definitions"
      enabled: true
    - name: "variable"
      description: "Search for variable declarations"
      enabled: true
    - name: "comment"
      description: "Search within code comments"
      enabled: true
  file_types:
    - extension: ".js"
      name: "JavaScript"
      enabled: true
    - extension: ".py"
      name: "Python"
      enabled: true
    - extension: ".java"
      name: "Java"
      enabled: true
    - extension: ".cpp"
      name: "C++"
      enabled: true
    - extension: ".cs"
      name: "C#"
      enabled: true
    - extension: ".php"
      name: "PHP"
      enabled: true
    - extension: ".rb"
      name: "Ruby"
      enabled: true
    - extension: ".go"
      name: "Go"
      enabled: true
    - extension: ".ts"
      name: "TypeScript"
      enabled: true
    - extension: ".html"
      name: "HTML"
      enabled: true
    - extension: ".css"
      name: "CSS"
      enabled: true
    - extension: ".json"
      name: "JSON"
      enabled: true
    - extension: ".xml"
      name: "XML"
      enabled: true
    - extension: ".md"
      name: "Markdown"
      enabled: true

performance:
  max_file_size_mb: 50
  max_results_display: 100
  max_files_display: 50
  debounce_time_ms: 300

features:
  real_time_indexing: true
  regex_search: true
  case_sensitive_search: true
  whole_word_search: true
  search_visualization: true
  code_preview: true
  export_results: true
  save_results: true
  search_history: true
  recent_searches: true
  keyboard_shortcuts: true

ui:
  font_family: "'Courier New', Courier, monospace"
  header_height: "70px"
  panel_border_radius: "12px"
  input_border_radius: "8px"
  button_border_radius: "8px"
  max_content_width: "1400px"
  mobile_breakpoint: "768px"

shortcuts:
  search: "Ctrl+Enter"
  focus_search: "/"
  save_results: "Ctrl+S"
  export_results: "Ctrl+E"

github:
  username: "mononeer"
  repo_name: "cfinder-pro"
  activity_days: 371
  contribution_levels: 6

social:
  twitter: "https://twitter.com/mononeer"
  github: "https://github.com/mononeer"
  youtube: "https://www.youtube.com/@mononeer"
  patreon: "https://www.patreon.com/mononeer"
  vercel: "https://vercel.com/mononeers"

blog:
  posts:
    - title: "Building a Real-time Search Engine"
      date: "2023-05-15"
      read_time: "8 min"
      excerpt: "Learn how to create a high-performance search engine with real-time indexing capabilities."
      tags: ["search", "performance", "indexing"]
    - title: "The Future of AI in Development"
      date: "2023-04-28"
      read_time: "12 min"
      excerpt: "Exploring how artificial intelligence is transforming the software development landscape."
      tags: ["ai", "machine learning", "future"]
    - title: "Serverless Architecture Best Practices"
      date: "2023-04-10"
      read_time: "10 min"
      excerpt: "Key principles and patterns for designing scalable serverless applications."
      tags: ["serverless", "architecture", "cloud"]

tools:
  - name: "CFinder Pro"
    description: "Advanced code search tool for large codebases with real-time indexing and visualization."
    icon: "fas fa-search"
    tags: ["javascript", "web app", "search"]
  - name: "CodeCollab"
    description: "Real-time collaborative code editor with integrated debugging and version control."
    icon: "fas fa-code"
    tags: ["react", "node.js", "websocket"]
  - name: "AI Assistant"
    description: "Intelligent assistant that helps developers with code completion and debugging."
    icon: "fas fa-robot"
    tags: ["python", "ai/ml", "nlp"]
  - name: "Analytics Dashboard"
    description: "Real-time data visualization platform for business intelligence."
    icon: "fas fa-chart-line"
    tags: ["vue.js", "d3.js", "mongodb"]

contact:
  email: "contact@mononeer.dev"
  location: "San Francisco, CA"
  form:
    fields:
      - name: "name"
        type: "text"
        required: true
      - name: "email"
        type: "email"
        required: true
      - name: "subject"
        type: "text"
        required: true
      - name: "message"
        type: "textarea"
        required: true

admin:
  blog_post_secret: "Ctrl+Shift+B"
  max_blog_posts: 50
  blog_storage: "localStorage"

notifications:
  success_color: "#66bb6a"
  error_color: "#f44336"
  warning_color: "#ffb74d"
  info_color: "#29b6f6"
  duration_ms: 3000

last_updated: "2023-05-20T14:30:00Z"
