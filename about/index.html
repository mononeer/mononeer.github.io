<!DOCTYPE html>
<html lang="en">
<head>

    <title>About | Mononeer</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/inter-font@4.0.1/css/inter.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jetbrains-mono@1.0.6/css/jetbrains-mono.min.css">
    <link rel="stylesheet" href="/styles.css">

<body>
    <div class="background"></div>
    <div class="terminal">
        <nav class="terminal-nav">
            <div class="breadcrumbs">
                <span class="path">~/portfolio/about</span>
            </div>
            <div class="nav-links">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/about/" aria-current="page">About</a>

        </nav>
        <main class="terminal-content">
            <section class="content active" data-view="about">
                <h2>About me</h2>
                <div class="file-content">
                    <p class="slide-up">Hi, I'm Rendani Manugeni</p>

        <footer class="terminal-footer">
            <span class="hint">Built by Rendani Manugeni &copy; 2025</span>
