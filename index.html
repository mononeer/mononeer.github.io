<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Mononeer</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/inter-font@4.0.1/css/inter.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jetbrains-mono@1.0.6/css/jetbrains-mono.min.css">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="background"></div>
    <div class="terminal">
        <nav class="terminal-nav">
            <div class="breadcrumbs">
                <span class="path">~/portfolio</span>
            </div>
            <div class="nav-links">
                <button class="nav-link" data-view="home" aria-current="page">Home</button>
                <a class="nav-link" href="/about/">About</a>
                <a class="nav-link" href="/projects/">Projects</a>
                <a class="nav-link" href="/apps/">Apps</a>
                <a class="nav-link" href="/gallery/">Gallery</a>
                <a class="nav-link" href="/library/">Library</a>
                <a class="nav-link" href="/github/">GitHub</a>
                <a class="nav-link" href="/social/">Social</a>
                <a class="nav-link" href="/contact/">Contact</a>
            </div>
        </nav>
        <main class="terminal-content">
            <section class="content active" data-view="home">
                <div class="hero">
                    <img src="/assets/logo.png" alt="Rendani's logo" class="logo" draggable="false">
                    <h1 class="typewriter">Welcome to my digital portfolio</h1>
                    <p>Explore my work as a full-stack developer and ML enthusiast</p>
                </div>
            </section>
        </main>
        <footer class="terminal-footer">
            <span class="hint">Built by Rendani Manugeni &copy; 2025</span>
        </footer>
    </div>
    <script src="/main.js" defer></script>
