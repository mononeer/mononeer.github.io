<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Mononeer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#000;--fg:#00BFFF;--glow:#0096FF33;--glass:#111a}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Courier Prime',monospace;background:linear-gradient(135deg,#000 0%,#001122 100%);color:var(--fg);min-height:100vh;display:flex;flex-direction:column}
    header{padding:1.5rem 2rem;backdrop-filter:blur(8px);border-bottom:1px solid var(--glow)}
    nav a{margin-right:1rem;color:var(--fg);font-weight:700;text-decoration:none}
    nav a:hover{text-decoration:underline}
    main{flex:1;padding:2rem}
    section{max-width:800px;margin:auto;display:none}
    section.active{display:block}
    .card{background:var(--glass);border:1px solid var(--glow);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 0 12px var(--glow)}
    footer{text-align:center;padding:1rem;font-size:.8rem;border-top:1px solid var(--glow)}
    #social-bar svg{width:20px;height:20px;fill:var(--fg);margin-right:.6rem}
    #social-bar a:hover svg{fill:#fff}
    form label{display:block;margin:.6rem 0}
    form input,form textarea{width:100%;padding:.6rem;background:#111;border:1px solid var(--glow);color:var(--fg);font-family:inherit;border-radius:4px}
    form button{padding:.6rem 1.2rem;background:var(--fg);color:var(--bg);border:none;font-weight:700;cursor:pointer;border-radius:4px}
    form button:hover{background:#fff}
  </style>
</head>
<body>

<header>
  <h1>Mononeer</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#projects">Projects</a>
    <a href="#blog">Blog</a>
    <a href="#contact">About / Contact</a>
  </nav>
</header>

<main>
  <!-- HOME -->
  <section id="home">
    <p>Welcome to the black & azure corner of the web.</p>
    <img id="gh-graph" src="https://ghchart.rshah.org/00BFFF/mononeer" alt="GitHub graph" style="max-width:100%;border-radius:8px"/>
  </section>

  <!-- PROJECTS -->
  <section id="projects">
    <h2>Current Repos</h2>
    <ul id="repo-list" class="card">Loading…</ul>
  </section>

  <!-- BLOG -->
  <section id="blog">
    <h2>Blog</h2>
    <div id="blog-list" class="card">Loading…</div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h2>About / Contact</h2>
    <p>Hi, I’m mononeer. Find me everywhere:</p>
    <div id="social-bar">
      <a href="https://x.com/mononeer" target="_blank"><svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231z"/></svg></a>
      <a href="https://patreon.com/mononeer" target="_blank"><svg viewBox="0 0 24 24"><path d="M22.01 7.858a5.57 5.57 0 0 0-2.33-2.47C18.46 4.5 16.38 4 13.5 4c-2.88 0-4.97.5-6.2 1.39-1.23.88-1.85 2.27-1.85 4.17v6.25c0 1.9.62 3.29 1.85 4.17 1.23.88 3.32 1.39 6.2 1.39 2.88 0 4.96-.5 6.18-1.39 1.22-.88 1.84-2.27 1.84-4.17V9.96c.01-.69-.07-1.37-.24-2.102z"/></svg></a>
      <a href="https://github.com/mononeer" target="_blank"><svg viewBox="0 0 24 24"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.565 21.796 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg></a>
      <a href="https://youtube.com/@mononeer" target="_blank"><svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></a>
    </div>

    <form action="https://formspree.io/f/mpwlrazo" method="POST">
      <label>Email<input type="email" name="email" required></label>
      <label>Message<textarea name="message" rows="5" required></textarea></label>
      <button>Send</button>
    </form>
  </section>
</main>

<footer>© Mononeer</footer>

<script>
// --- router ---
const sections = ['home','projects','blog','contact'];
function route() {
  const hash = location.hash.slice(1) || 'home';
  sections.forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.toggle('active', id===hash);
  });
}
window.addEventListener('hashchange', route);
window.addEventListener('load', route);

// --- projects ---
async function loadRepos(){
  const list=document.getElementById('repo-list');
  const repos=await fetch('https://api.github.com/users/mononeer/repos?per_page=100&sort=updated').then(r=>r.json());
  list.innerHTML=repos.map(r=>`
    <li class="card">
      <strong><a href="${r.html_url}" target="_blank">${r.name}</a></strong>
      <p>${r.description||''}</p>
      <small>Updated: ${new Date(r.updated_at).toLocaleString()}</small>
    </li>`).join('');
}
loadRepos();
setInterval(loadRepos, 30_000);

// --- blog ---
const parseYML = txt=>{
  const [meta,...body]=txt.split('\n---\n');
  const obj={};
  meta.split('\n').forEach(l=>{
    const [k,v]=l.split(': ');
    if(k) obj[k.trim()]=v.trim();
  });
  obj.content=body.join('\n---\n').trim();
  return obj;
};
async function loadBlog(){
  const holder=document.getElementById('blog-list');
  try{
    const index=await fetch('posts/index.json').then(r=>r.json());
    holder.innerHTML='';
    for(const slug of index){
      const raw=await fetch(`posts/${slug}.yml`).then(r=>r.text());
      const {title,date,content}=parseYML(raw);
      holder.insertAdjacentHTML('beforeend',`
        <article class="card">
          <h2>${title}</h2>
          <small>${date}</small>
          ${content.split('\n').map(l=>`<p>${l}</p>`).join('')}
        </article>`);
    }
  }catch{holder.textContent='No posts yet.';}
}
loadBlog();
setInterval(loadBlog, 30_000);
</script>
</body>
</html>
