<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Admin Blog Poster</title>
  <link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
  <header>
    <h1>Post a new blog</h1>
    <nav>
      <a href="index.html">← back to site</a>
    </nav>
  </header>

  <main>
    <form id="admin-form">
      <label>Password
        <input type="password" id="pw" required>
      </label>

      <label>Title
        <input type="text" id="title" required>
      </label>

      <label>Date (YYYY-MM-DD)
        <input type="date" id="date" required>
      </label>

      <label>Body (YAML-safe plain text)
        <textarea id="body" rows="10" required></textarea>
      </label>

      <button>Publish</button>
    </form>
  </main>

  <footer></footer>

  <script>
    // extremely simple password gate
    const PASS = 'mono1234';          // change me
    const form = document.getElementById('admin-form');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      if (document.getElementById('pw').value !== PASS) {
        alert('Wrong password'); return;
      }
      const payload = {
        title: document.getElementById('title').value,
        date: document.getElementById('date').value,
        body: document.getElementById('body').value
      };
      await fetch('../api/post', {   // handled by tiny server below
        method: 'POST',
        body: JSON.stringify(payload)
      });
      alert('Published!');
      form.reset();
    });
  </script>
</body>
</html>
